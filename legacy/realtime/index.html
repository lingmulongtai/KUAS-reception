<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F8C52">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>KUAS 受付 – iPad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- ネットワーク状態バナー -->
  <div id="network-banner" class="network-banner" role="status" aria-live="polite"></div>

  <!-- メインアプリ領域 -->
  <main id="app" class="app-root" aria-live="polite"></main>

  <!-- トースト通知 -->
  <div id="toast" class="toast" role="alert" aria-live="assertive"></div>

  <!-- Firebase SDK (Realtime Database) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <!-- Firebase 設定・共通モジュール -->
  <script src="./firebase-config.js"></script>
  <script src="./app.js"></script>

  <!-- iPad 受付アプリ本体 -->
  <script>
  (() => {
    // ─── 定数 ──────────────────────────────────────────────
    const ROOT_ID = 'app';

    const Steps = {
      LANDING:        'landing',
      RESERVED_FORM:  'reserved-form',
      WALKIN_FORM:    'walkin-form',
      PROGRAM_SELECT: 'program-select',
      SUMMARY:        'summary',
      BRIEFING_ONLY:  'briefing-only',
      SUCCESS:        'success'
    };

    // ─── 状態 ──────────────────────────────────────────────
    let programs = {};    // Firebase /programs からのリアルタイムデータ
    let confirmedAttendees = {}; // 各プログラムの確定人数計算用

    const initialUser = () => ({
      name:       '',
      furigana:   '',
      school:     '',
      grade:      '',
      companions: 0,
      choices:    [],
      type:       'walkin'
    });

    let state = {
      step:        Steps.LANDING,
      currentUser: initialUser(),
      isWaiting:   false
    };

    let countdownTimer = null;

    // ─── ユーティリティ ────────────────────────────────────
    const $ = (sel) => document.querySelector(sel);
    const root = () => document.getElementById(ROOT_ID);

    const setState = (partial) => {
      state = { ...state, ...partial };
    };

    // ─── プログラム容量ヘルパー ────────────────────────────
    const getProgramRemaining = (programId) => {
      const prog = programs[programId];
      if (!prog) return 0;
      const capacity = Number(prog.capacity) || 0;
      let used = 0;
      for (const attendee of Object.values(confirmedAttendees || {})) {
        if (attendee && attendee.assignedProgram === programId) {
          used += 1 + (Number(attendee.companions) || 0);
        }
      }
      return Math.max(capacity - used, 0);
    };

    const isProgramFull = (programId) => getProgramRemaining(programId) <= 0;

    // ─── HTML テンプレート ──────────────────────────────────
    const renderLanding = () => /* html */`
      <section class="screen" data-step="landing">
        <header class="screen-header">
          <span class="pill"><i class="ph ph-planet"></i> ようこそ KUAS へ</span>
          <h1 class="screen-title">工学部ミニキャップストーン体験<br>受付</h1>
          <p class="screen-subtitle">ご予約の有無を選択してください。スタッフがご案内いたします。</p>
        </header>
        <div class="card-grid">
          <article class="card">
            <i class="ph-fill ph-calendar-check card-icon"></i>
            <h2 class="card-title">予約ありのお客様</h2>
            <p class="card-description">お名前などを入力して受付を完了します。</p>
            <div class="card-action">
              <button class="card-button" data-action="go-reserved">
                <i class="ph ph-arrow-right"></i>受付に進む
              </button>
            </div>
          </article>
          <article class="card">
            <i class="ph-fill ph-user-plus card-icon"></i>
            <h2 class="card-title">予約なしのお客様</h2>
            <p class="card-description">お名前・学年などを入力し、体験プログラムを選択します。</p>
            <div class="card-action">
              <button class="card-button" data-action="go-walkin">
                <i class="ph ph-arrow-right"></i>受付に進む
              </button>
            </div>
          </article>
        </div>
      </section>
    `;

    const renderReservedForm = () => /* html */`
      <section class="screen" data-step="reserved-form">
        <header class="screen-header">
          <button class="secondary-button" data-action="back" style="align-self:flex-start">
            <i class="ph ph-arrow-left"></i>もどる
          </button>
          <span class="pill"><i class="ph ph-calendar-check"></i> 予約あり</span>
          <h1 class="screen-title">お客様情報を入力してください</h1>
        </header>
        <form class="form" data-form="reserved">
          <div class="field-group">
            <label class="field-label" for="r-name">お名前<span class="required-mark">必須</span></label>
            <input class="text-input" id="r-name" name="name" autocomplete="off"
              inputmode="text" placeholder="例：山田 太郎" value="${escHtml(state.currentUser.name)}" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="r-furigana">フリガナ<span class="required-mark">必須</span></label>
            <input class="text-input" id="r-furigana" name="furigana" autocomplete="off"
              inputmode="text" placeholder="例：ヤマダ タロウ" value="${escHtml(state.currentUser.furigana)}" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="r-school">学校名</label>
            <input class="text-input" id="r-school" name="school" autocomplete="off"
              placeholder="例：〇〇高等学校" value="${escHtml(state.currentUser.school)}">
          </div>
          <div class="field-group">
            <label class="field-label" for="r-grade">学年<span class="required-mark">必須</span></label>
            <select class="select-input" id="r-grade" name="grade" required>
              <option value="" ${!state.currentUser.grade ? 'selected' : ''} disabled>選択してください</option>
              ${['高校1年生','高校2年生','高校3年生','その他'].map(g =>
                `<option value="${g}" ${state.currentUser.grade === g ? 'selected' : ''}>${g}</option>`
              ).join('')}
            </select>
          </div>
          <div class="field-group">
            <label class="field-label" for="r-companions">同伴者人数<span class="required-mark">必須</span></label>
            <select class="select-input" id="r-companions" name="companions" required>
              <option value="" ${state.currentUser.companions === '' ? 'selected' : ''} disabled>選択してください</option>
              ${[0,1,2,3,4,5].map(n =>
                `<option value="${n}" ${String(state.currentUser.companions) === String(n) ? 'selected' : ''}>${n}名</option>`
              ).join('')}
            </select>
          </div>
          <button type="submit" class="primary-button" style="width:100%">
            プログラムを選ぶ <i class="ph ph-caret-right"></i>
          </button>
          <button type="button" class="secondary-button" style="width:100%" data-action="briefing-only-reserved">
            キャップストーン体験には参加しない
          </button>
        </form>
      </section>
    `;

    const renderWalkinForm = () => /* html */`
      <section class="screen" data-step="walkin-form">
        <header class="screen-header">
          <button class="secondary-button" data-action="back" style="align-self:flex-start">
            <i class="ph ph-arrow-left"></i>もどる
          </button>
          <span class="pill"><i class="ph ph-user"></i> 予約なし</span>
          <h1 class="screen-title">お客様情報を入力してください</h1>
        </header>
        <form class="form" data-form="walkin">
          <div class="field-group">
            <label class="field-label" for="w-name">お名前<span class="required-mark">必須</span></label>
            <input class="text-input" id="w-name" name="name" autocomplete="off"
              inputmode="text" placeholder="例：佐藤 花子" value="${escHtml(state.currentUser.name)}" required>
            <p class="field-hint">姓と名の間にスペースを入れてください。</p>
          </div>
          <div class="field-group">
            <label class="field-label" for="w-furigana">フリガナ<span class="required-mark">必須</span></label>
            <input class="text-input" id="w-furigana" name="furigana" autocomplete="off"
              inputmode="text" placeholder="例：サトウ ハナコ" value="${escHtml(state.currentUser.furigana)}" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="w-school">学校名</label>
            <input class="text-input" id="w-school" name="school" autocomplete="off"
              placeholder="例：〇〇高等学校" value="${escHtml(state.currentUser.school)}">
          </div>
          <div class="field-group">
            <label class="field-label" for="w-grade">学年<span class="required-mark">必須</span></label>
            <select class="select-input" id="w-grade" name="grade" required>
              <option value="" ${!state.currentUser.grade ? 'selected' : ''} disabled>選択してください</option>
              ${['高校1年生','高校2年生','高校3年生','その他'].map(g =>
                `<option value="${g}" ${state.currentUser.grade === g ? 'selected' : ''}>${g}</option>`
              ).join('')}
            </select>
          </div>
          <div class="field-group">
            <label class="field-label" for="w-companions">同伴者人数<span class="required-mark">必須</span></label>
            <select class="select-input" id="w-companions" name="companions" required>
              <option value="" ${state.currentUser.companions === '' ? 'selected' : ''} disabled>選択してください</option>
              ${[0,1,2,3,4,5].map(n =>
                `<option value="${n}" ${String(state.currentUser.companions) === String(n) ? 'selected' : ''}>${n}名</option>`
              ).join('')}
            </select>
          </div>
          <button type="submit" class="primary-button" style="width:100%">
            プログラムを選ぶ <i class="ph ph-caret-right"></i>
          </button>
          <button type="button" class="secondary-button" style="width:100%" data-action="briefing-only-walkin">
            キャップストーン体験には参加しない
          </button>
        </form>
      </section>
    `;

    const renderProgramSelect = () => {
      const programList = Object.entries(programs)
        .sort(([, a], [, b]) => (a.order || 0) - (b.order || 0));
      const choices = Array.isArray(state.currentUser.choices) ? state.currentUser.choices : [];

      const programItems = programList.map(([pid, prog]) => {
        const selIdx     = choices.indexOf(pid);
        const isSelected = selIdx >= 0;
        const isFull     = isProgramFull(pid);
        const remaining  = getProgramRemaining(pid);
        const capacity   = Number(prog.capacity) || 0;
        const choiceLabels = ['第1希望','第2希望','第3希望'];

        return /* html */`
          <button type="button"
            class="program-chip ${isSelected ? 'selected' : ''} ${isFull && !isSelected ? 'full' : ''}"
            data-program-id="${escAttr(pid)}">
            <div class="chip-title">${escHtml(prog.title || '')}</div>
            ${prog.description ? `<div class="chip-desc">${escHtml(prog.description)}</div>` : ''}
            <div class="chip-capacity">定員 ${capacity} / 残り ${remaining}</div>
            <span class="chip-status-badge ${isFull ? 'full' : ''}">
              <span class="dot"></span>${isFull ? '満員' : '受付中'}
            </span>
            ${isSelected ? `<span class="chip-choice-label">${choiceLabels[selIdx]}</span>` : ''}
          </button>
        `;
      }).join('');

      return /* html */`
        <section class="screen" data-step="program-select">
          <header class="screen-header">
            <button class="secondary-button" data-action="back" style="align-self:flex-start">
              <i class="ph ph-arrow-left"></i>もどる
            </button>
            <span class="pill"><i class="ph ph-stack"></i> プログラム選択</span>
            <h1 class="screen-title">希望するプログラムをお選びください</h1>
            <p class="screen-subtitle">最大3つまで優先順に選択できます。</p>
          </header>
          ${programList.length === 0 ? '<p class="screen-subtitle" style="text-align:center">プログラム情報を読み込み中...</p>' : ''}
          <div class="program-grid">${programItems}</div>
          <div class="bottom-actions">
            <button class="secondary-button" data-action="clear-choices">選択をクリア</button>
            <button class="primary-button" data-action="confirm-choices">
              選択を確定する <i class="ph ph-check"></i>
            </button>
          </div>
        </section>
      `;
    };

    const renderSummary = () => {
      const user    = state.currentUser;
      const choices = Array.isArray(user.choices) ? user.choices : [];
      const labels  = ['第1希望','第2希望','第3希望'];

      const choiceItems = choices.map((pid, i) => {
        const prog = programs[pid];
        if (!prog) return '';
        return /* html */`
          <div class="timeline-item">
            <div class="dot"></div>
            <div class="content">
              <strong>${labels[i]}</strong> – ${escHtml(prog.title || pid)}
            </div>
          </div>
        `;
      }).join('');

      return /* html */`
        <section class="screen" data-step="summary">
          <div class="summary-card">
            <span class="badge"><i class="ph ph-check-circle"></i> 受付内容を確認</span>
            <p class="visitor-name">${escHtml(user.name)}</p>
            <div class="detail-row"><span>フリガナ</span><span>${escHtml(user.furigana)}</span></div>
            ${user.school ? `<div class="detail-row"><span>学校名</span><span>${escHtml(user.school)}</span></div>` : ''}
            <div class="detail-row"><span>学年</span><span>${escHtml(user.grade)}</span></div>
            <div class="detail-row"><span>同伴者</span><span>${user.companions}名</span></div>
            <div class="detail-row"><span>種別</span><span>${user.type === 'reserved' ? '予約あり' : '当日参加'}</span></div>
          </div>
          ${choices.length > 0 ? /* html */`
          <section style="display:flex;flex-direction:column;gap:14px;">
            <h2 class="screen-title" style="font-size:1.1rem;">選択したプログラム</h2>
            <div class="timeline">${choiceItems}</div>
          </section>` : ''}
          <p class="screen-subtitle" style="font-size:0.82rem;margin:0">
            ※ 受付確定後、スタッフが席を割り当てます。内容をご確認の上、確定してください。
          </p>
          <div class="bottom-actions">
            <button class="secondary-button" data-action="back">変更する</button>
            <button class="primary-button" data-action="finalize">
              受付を確定する <i class="ph ph-paper-plane-tilt"></i>
            </button>
          </div>
        </section>
      `;
    };

    const renderBriefingOnly = () => {
      const user = state.currentUser;
      return /* html */`
        <section class="screen" data-step="briefing-only">
          <div class="summary-card">
            <span class="badge"><i class="ph ph-megaphone"></i> 工学部説明会の受付</span>
            <p class="visitor-name">${escHtml(user.name)}</p>
            <div class="detail-row"><span>学年</span><span>${escHtml(user.grade)}</span></div>
            <div class="detail-row"><span>同伴者</span><span>${user.companions}名</span></div>
            <p style="opacity:0.92;font-size:0.88rem;margin:0">
              キャップストーン体験への参加はありません。説明会会場までご案内します。
            </p>
          </div>
          <div class="bottom-actions">
            <button class="secondary-button" data-action="back">もどる</button>
            <button class="primary-button" data-action="finalize-briefing">
              受付を完了する <i class="ph ph-check-circle"></i>
            </button>
          </div>
        </section>
      `;
    };

    const renderSuccess = () => {
      const user    = state.currentUser;
      const choices = Array.isArray(user.choices) ? user.choices : [];
      const labels  = ['第1希望','第2希望','第3希望'];
      const isBriefing = user.type === 'briefing_only';

      const choiceItems = choices.map((pid, i) => {
        const prog = programs[pid];
        if (!prog) return '';
        return /* html */`
          <div class="timeline-item">
            <div class="dot"></div>
            <div class="content">${labels[i]} – ${escHtml(prog.title || pid)}</div>
          </div>
        `;
      }).join('');

      return /* html */`
        <section class="screen" data-step="success">
          <div class="summary-card">
            <span class="badge"><i class="ph ph-confetti"></i> 受付が完了しました！</span>
            <p class="visitor-name">${escHtml(user.name)} 様</p>
            <div class="detail-row"><span>学年</span><span>${escHtml(user.grade)}</span></div>
            <div class="detail-row"><span>同伴者</span><span>${user.companions}名</span></div>
            <div class="detail-row">
              <span>ステータス</span>
              <span>${isBriefing ? '説明会参加' : '割り当て待機中'}</span>
            </div>
            <div>
              <p style="font-size:0.82rem;opacity:0.9;margin:0 0 6px;">
                ${isBriefing
                  ? '案内スタッフにお声がけください。'
                  : 'スタッフが席を割り当てます。しばらくお待ちください。'}
              </p>
              <div class="countdown-bar">
                <div class="countdown-fill" id="countdown-fill" style="width:100%"></div>
              </div>
            </div>
          </div>
          ${!isBriefing && choices.length > 0 ? /* html */`
          <section style="display:flex;flex-direction:column;gap:14px;">
            <h2 class="screen-title" style="font-size:1rem;">登録した希望プログラム</h2>
            <div class="timeline">${choiceItems}</div>
          </section>` : ''}
          <p id="countdown-msg" class="screen-subtitle" style="text-align:center;font-size:0.88rem;">
            5秒後に最初の画面へ戻ります…
          </p>
          <button class="primary-button" style="width:100%" data-action="back-home">
            <i class="ph ph-house"></i> 今すぐ最初の画面に戻る
          </button>
        </section>
      `;
    };

    // ─── レンダリング ──────────────────────────────────────
    const render = () => {
      stopCountdown();
      const el = root();
      if (!el) return;

      switch (state.step) {
        case Steps.LANDING:        el.innerHTML = renderLanding();       break;
        case Steps.RESERVED_FORM:  el.innerHTML = renderReservedForm();  break;
        case Steps.WALKIN_FORM:    el.innerHTML = renderWalkinForm();    break;
        case Steps.PROGRAM_SELECT: el.innerHTML = renderProgramSelect(); break;
        case Steps.SUMMARY:        el.innerHTML = renderSummary();       break;
        case Steps.BRIEFING_ONLY:  el.innerHTML = renderBriefingOnly();  break;
        case Steps.SUCCESS:
          el.innerHTML = renderSuccess();
          startCountdown();
          break;
        default:
          el.innerHTML = renderLanding();
      }
      attachHandlers(el);
    };

    // ─── カウントダウン（成功画面 → 5秒後にトップへ） ────
    const stopCountdown = () => {
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
    };

    const startCountdown = () => {
      stopCountdown();
      let remaining = 5;
      const fill = () => document.getElementById('countdown-fill');
      const msg  = () => document.getElementById('countdown-msg');

      countdownTimer = setInterval(() => {
        remaining--;
        const pct = (remaining / 5) * 100;
        if (fill()) fill().style.width = pct + '%';
        if (msg())  msg().textContent = `${remaining}秒後に最初の画面へ戻ります…`;
        if (remaining <= 0) {
          stopCountdown();
          resetToHome();
        }
      }, 1000);
    };

    const resetToHome = () => {
      setState({ step: Steps.LANDING, currentUser: initialUser() });
      render();
    };

    // ─── イベントハンドラー ────────────────────────────────
    const attachHandlers = (el) => {
      // ランディング
      el.querySelector('[data-action="go-reserved"]')?.addEventListener('click', () => {
        setState({ step: Steps.RESERVED_FORM, currentUser: { ...initialUser(), type: 'reserved' } });
        render();
      });
      el.querySelector('[data-action="go-walkin"]')?.addEventListener('click', () => {
        setState({ step: Steps.WALKIN_FORM, currentUser: { ...initialUser(), type: 'walkin' } });
        render();
      });

      // 予約ありフォーム
      const reservedForm = el.querySelector('[data-form="reserved"]');
      if (reservedForm) {
        reservedForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const data = parseForm(reservedForm);
          if (!validateForm(data)) return;
          setState({
            currentUser: { ...state.currentUser, ...data, type: 'reserved' },
            step: Steps.PROGRAM_SELECT
          });
          render();
        });
        el.querySelector('[data-action="briefing-only-reserved"]')?.addEventListener('click', () => {
          const data = parseForm(reservedForm);
          if (!data.name || !data.furigana) {
            KuasApp.showToast('お名前とフリガナを入力してください');
            return;
          }
          setState({
            currentUser: { ...state.currentUser, ...data, type: 'reserved', choices: [] },
            step: Steps.BRIEFING_ONLY
          });
          render();
        });
      }

      // 予約なしフォーム
      const walkinForm = el.querySelector('[data-form="walkin"]');
      if (walkinForm) {
        walkinForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const data = parseForm(walkinForm);
          if (!validateForm(data)) return;
          setState({
            currentUser: { ...state.currentUser, ...data, type: 'walkin' },
            step: Steps.PROGRAM_SELECT
          });
          render();
        });
        el.querySelector('[data-action="briefing-only-walkin"]')?.addEventListener('click', () => {
          const data = parseForm(walkinForm);
          if (!data.name || !data.furigana) {
            KuasApp.showToast('お名前とフリガナを入力してください');
            return;
          }
          setState({
            currentUser: { ...state.currentUser, ...data, type: 'walkin', choices: [] },
            step: Steps.BRIEFING_ONLY
          });
          render();
        });
      }

      // プログラム選択
      el.querySelectorAll('.program-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const pid = chip.dataset.programId;
          if (!pid) return;
          const choices = Array.isArray(state.currentUser.choices) ? [...state.currentUser.choices] : [];
          const idx = choices.indexOf(pid);
          if (idx >= 0) {
            choices.splice(idx, 1);
          } else {
            if (choices.length >= 3) {
              KuasApp.showToast('選択できるのは最大3つです');
              return;
            }
            choices.push(pid);
          }
          setState({ currentUser: { ...state.currentUser, choices } });
          render();
        });
      });

      el.querySelector('[data-action="clear-choices"]')?.addEventListener('click', () => {
        setState({ currentUser: { ...state.currentUser, choices: [] } });
        render();
      });

      el.querySelector('[data-action="confirm-choices"]')?.addEventListener('click', () => {
        const choices = Array.isArray(state.currentUser.choices) ? state.currentUser.choices : [];
        if (choices.length === 0) {
          KuasApp.showToast('希望するプログラムを1つ以上選択してください');
          return;
        }
        setState({ step: Steps.SUMMARY });
        render();
      });

      // サマリー確定
      el.querySelector('[data-action="finalize"]')?.addEventListener('click', () => {
        finalizeSubmission(false);
      });

      // 説明会のみ確定
      el.querySelector('[data-action="finalize-briefing"]')?.addEventListener('click', () => {
        finalizeSubmission(true);
      });

      // 成功画面 → ホームへ
      el.querySelector('[data-action="back-home"]')?.addEventListener('click', () => {
        resetToHome();
      });

      // もどる
      el.querySelector('[data-action="back"]')?.addEventListener('click', () => {
        goBack();
      });
    };

    const parseForm = (form) => {
      const fd = new FormData(form);
      return {
        name:       (fd.get('name')       || '').trim(),
        furigana:   (fd.get('furigana')   || '').trim(),
        school:     (fd.get('school')     || '').trim(),
        grade:      (fd.get('grade')      || ''),
        companions: Number(fd.get('companions') || 0)
      };
    };

    const validateForm = (data) => {
      if (!data.name) {
        KuasApp.showToast('お名前を入力してください');
        return false;
      }
      if (!data.furigana) {
        KuasApp.showToast('フリガナを入力してください');
        return false;
      }
      if (!data.grade) {
        KuasApp.showToast('学年を選択してください');
        return false;
      }
      if (isNaN(data.companions) || data.companions < 0) {
        KuasApp.showToast('同伴者人数を正しく選択してください');
        return false;
      }
      return true;
    };

    const goBack = () => {
      const prev = {
        [Steps.RESERVED_FORM]:  Steps.LANDING,
        [Steps.WALKIN_FORM]:    Steps.LANDING,
        [Steps.PROGRAM_SELECT]: state.currentUser.type === 'reserved' ? Steps.RESERVED_FORM : Steps.WALKIN_FORM,
        [Steps.SUMMARY]:        Steps.PROGRAM_SELECT,
        [Steps.BRIEFING_ONLY]:  state.currentUser.type === 'reserved' ? Steps.RESERVED_FORM : Steps.WALKIN_FORM
      };
      const nextStep = prev[state.step] || Steps.LANDING;
      setState({ step: nextStep });
      render();
    };

    // ─── Firebase への送信 ────────────────────────────────
    const finalizeSubmission = async (briefingOnly = false) => {
      const user = state.currentUser;
      if (!user || !user.name) {
        KuasApp.showToast('受付情報が見つかりません');
        return;
      }

      const btn = root()?.querySelector('[data-action="finalize"], [data-action="finalize-briefing"]');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 送信中…'; }

      try {
        const choices = Array.isArray(user.choices) ? user.choices : [];
        const payload = {
          name:       user.name,
          furigana:   user.furigana || '',
          school:     user.school   || '',
          grade:      user.grade    || '',
          companions: Number(user.companions) || 0,
          choices:    briefingOnly ? [] : choices,
          type:       briefingOnly ? 'briefing_only' : (user.type || 'walkin')
        };

        await KuasApp.pushToNode(KuasApp.DB_PATHS.waitingList, payload);

        setState({
          step:        Steps.SUCCESS,
          currentUser: { ...user, choices: payload.choices, type: payload.type }
        });
        render();
        KuasApp.showToast('受付内容を登録しました');
      } catch (err) {
        console.error('[KUAS] 送信失敗:', err);
        KuasApp.showToast('送信に失敗しました。もう一度お試しください。');
        if (btn) { btn.disabled = false; btn.innerHTML = '受付を確定する <i class="ph ph-paper-plane-tilt"></i>'; }
      }
    };

    // ─── XSS対策エスケープ（app.js の共通実装を参照） ────────
    const escHtml  = (str) => KuasApp.escHtml(str);
    const escAttr  = (str) => KuasApp.escAttr(str);

    // ─── 初期化 ───────────────────────────────────────────
    const init = () => {
      if (!KuasApp.initFirebase()) {
        KuasApp.showToast('Firebase の設定が完了していません。firebase-config.js を確認してください。', 6000);
      }

      // Firebase からプログラム一覧をリアルタイム購読
      KuasApp.listenToNode(KuasApp.DB_PATHS.programs, (val) => {
        programs = val || {};
        if (state.step === Steps.PROGRAM_SELECT) render();
      });

      // 確定者数のリアルタイム購読（残席計算用）
      KuasApp.listenToNode(KuasApp.DB_PATHS.confirmedAttendees, (val) => {
        confirmedAttendees = val || {};
        if (state.step === Steps.PROGRAM_SELECT) render();
      });

      KuasApp.initNetworkStatus();
      KuasApp.preventReload();
      render();
    };

    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
